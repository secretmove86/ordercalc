<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>2026年3月版</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <div class="title">2026年3月版</div>
  </header>

  <main id="appPanel" class="app">
    <section class="group">
      <h2>一般品</h2>
      <div id="tblGeneral"></div>
    </section>

    <section class="group">
      <details>
        <summary>ナノニードル</summary>
        <div id="tblNeedle"></div>
      </details>
    </section>

    <section class="group">
      <details>
        <summary>ナノカニューレ</summary>
        <div id="tblCannula"></div>
      </details>
    </section>

    <!-- 下部固定バーに隠れないよう余白 -->
    <div class="bottom-spacer"></div>
  </main>

  <!-- 下部固定：合計＆受注ボタン -->
  <div class="bottom-bar">
    <div class="bottom-sums">
      <div class="sumline">
        <div class="lbl">合計（税抜/税込）</div>
        <div class="val"><span id="sumAllEx">0</span> / <span id="sumAllIn">0</span></div>
      </div>
      <div class="subline">
        <span>一般品: <span id="sumGeneralIn">0</span></span>
        <span>ニードル: <span id="sumNeedleIn">0</span></span>
        <span>カニューレ: <span id="sumCannulaIn">0</span></span>
      </div>
    </div>

    <button id="orderBtn" class="order-btn" type="button">受注</button>
  </div>

  <!-- 受注モーダル -->
  <div id="orderModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-title">今回の受注</div>
        <button id="orderModalClose" class="modal-close" type="button">×</button>
      </div>

      <div id="orderList" class="modal-body"></div>

      <div class="modal-foot">
        <button id="orderCopy" class="modal-copy" type="button">コピー</button>
        <button class="modal-ok" type="button" onclick="document.getElementById('orderModal').classList.add('hidden')">閉じる</button>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
